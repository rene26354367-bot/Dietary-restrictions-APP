// ── HOOK ──────────────────────────────────────────────────────────────────────
function useTheme(themeId) {
  useEffect(() => {
    const t = THEMES[themeId];
    if (!t) return;
    Object.entries(t.vars).forEach(([k,v]) => document.documentElement.style.setProperty(k, v));
  }, [themeId]);
}

function Btn({ href, variant='primary', children, style={} }) {
  const base = {
    display:'inline-flex', alignItems:'center', gap:8,
    padding:'14px 34px', borderRadius:100, textDecoration:'none',
    fontSize:'0.975rem', fontWeight:700, fontFamily:'var(--font-body)',

  };
  const prim = { background:'var(--primary)', color:'var(--btn-text)', boxShadow:'0 12px 32px var(--primary-alpha)' };
  const sec  = { background:'var(--bg-card)', color:'var(--text)', border:'1px solid var(--border)' };
  const s = { ...base, ...(variant === 'primary' ? prim : sec), ...style };
  return (
    <a href={href} target="_blank" rel="noopener" style={s}
      onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; if(variant==='primary') e.currentTarget.style.boxShadow='0 18px 44px var(--primary-alpha)'; else e.currentTarget.style.borderColor='var(--primary)'; }}

  );
}

// ── TWEAKS PANEL ──────────────────────────────────────────────────────────────
function TweaksPanel({ themeId, setThemeId, lang, setLang }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const fn = e => {
      if (e.data?.type === '__activate_edit_mode') setShow(true);
      if (e.data?.type === '__deactivate_edit_mode') setShow(false);
    };
    window.addEventListener('message', fn);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', fn);
  }, []);
  const pick = (key, val) => {
    if (key === 'themeId') setThemeId(val);
    if (key === 'lang') setLang(val);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [key]:val } }, '*');
  };
  if (!show) return null;
  return (
    <div style={{position:'fixed', bottom:24, right:24, zIndex:9999, background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:20, padding:'22px 20px', width:268, boxShadow:'0 24px 64px rgba(0,0,0,0.18)'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
        <span style={{fontFamily:'var(--font-display)', fontWeight:800, fontSize:'0.95rem', color:'var(--text)'}}>Tweaks</span>
        <button onClick={()=>{ setShow(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }}
          style={{background:'none', border:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:'1.4rem', lineHeight:1}}>×</button>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:'0.68rem', fontWeight:700, color:'var(--text-muted)', letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:9, fontFamily:'var(--font-body)'}}>視覺主題</div>
        <div style={{display:'flex', flexDirection:'column', gap:7}}>
          {Object.values(THEMES).map(t=>(
            <button key={t.id} onClick={()=>pick('themeId', t.id)} style={{
              background:themeId===t.id?'var(--primary-alpha)':'transparent',
              border:`1px solid ${themeId===t.id?'var(--primary)':'var(--border)'}`,
              borderRadius:10, padding:'9px 12px', cursor:'pointer',
              textAlign:'left', display:'flex', alignItems:'center', gap:9,
              transition:'border-color 0.2s',
            }}>
              <span style={{fontSize:'1rem'}}>{t.icon}</span>
              <span style={{fontFamily:'var(--font-body)', fontSize:'0.875rem', fontWeight:600, color:'var(--text)'}}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:'0.68rem', fontWeight:700, color:'var(--text-muted)', letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:9, fontFamily:'var(--font-body)'}}>語言</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:7}}>
          {[['zh','中文'],['en','English']].map(([code,label])=>(
            <button key={code} onClick={()=>pick('lang', code)} style={{
              background:lang===code?'var(--primary-alpha)':'transparent',
              border:`1px solid ${lang===code?'var(--primary)':'var(--border)'}`,
              borderRadius:10, padding:'9px 12px', cursor:'pointer',
              fontFamily:'var(--font-body)', fontSize:'0.875rem', fontWeight:600, color:'var(--text)',
              transition:'border-color 0.2s',
            }}>{label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {

  useTheme(themeId);
  return (
    <div>
      <Nav lang={lang} setLang={setLang} />

      <Features lang={lang} />
      <Changelog lang={lang} />

      <Contact lang={lang} />
      <Footer lang={lang} />
      <TweaksPanel themeId={themeId} setThemeId={setThemeId} lang={lang} setLang={setLang} />

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
